name: Build and deploy

# Dokploy is connected to origin (MrOwaisAbdullah/Owflex-Chatbot-Saas).
# Every push to master builds the image and deploys to the VPS automatically.
# No release branch needed — master is production.
on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/mrowaisabdullah/owflex-chat
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # TEMP DIAGNOSTIC: prints only the LENGTH of each public build secret, never
      # the value (GitHub masks values anyway). length 0 = the secret is missing or
      # misnamed for this workflow. Remove once the env config is confirmed.
      - name: Verify build secrets present (lengths only)
        run: |
          echo "NEXT_PUBLIC_APP_URL len:            ${#APP_URL}"
          echo "NEXT_PUBLIC_PORTAL_URL len:         ${#PORTAL_URL}"
          echo "NEXT_PUBLIC_SANITY_PROJECT_ID len:  ${#SANITY_PROJECT_ID}"
          echo "NEXT_PUBLIC_SANITY_DATASET len:     ${#SANITY_DATASET}"
          echo "NEXT_PUBLIC_SANITY_API_VERSION len: ${#SANITY_API_VERSION}"
          [ -z "$SANITY_PROJECT_ID" ] && echo "::warning::NEXT_PUBLIC_SANITY_PROJECT_ID is EMPTY — Studio/blog disabled" || true
        env:
          APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          PORTAL_URL: ${{ secrets.NEXT_PUBLIC_PORTAL_URL }}
          SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64   # match the Intel CX33 VPS
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PORTAL_URL=${{ secrets.NEXT_PUBLIC_PORTAL_URL }}
            NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
            NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
            NEXT_PUBLIC_SANITY_API_VERSION=${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
            NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
            NEXT_PUBLIC_DEMO_VIDEO_URL=${{ secrets.NEXT_PUBLIC_DEMO_VIDEO_URL }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deploy
        run: |
          curl -fsSL -X POST "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APP_ID }}"}'

      # Docker image pruning is handled by a weekly server-side cron job,
      # not from this workflow (avoids storing SSH private keys in secrets).
